server {
  listen 80;
  server_name _;
  server_tokens off;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (server-level; cache below uses `expires`, not add_header, so these stay inherited).
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; worker-src 'self' blob:; child-src blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.cartocdn.com; connect-src 'self' https://*.cartocdn.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml application/geo+json;

  location = /healthz { default_type text/plain; return 200 'ok'; }

  # serve .geojson as JSON so it gzips, and cache the (regenerated) track files a week
  location ~* \.geojson$ { default_type application/json; expires 7d; }

  # hashed build assets — immutable, long cache (expires keeps the inherited security headers)
  location /assets/ { expires 1y; try_files $uri =404; }

  # SPA fallback. expires -1 → Cache-Control: no-cache on the HTML so a redeploy is seen
  # immediately (uses expires, not add_header, so the inherited security headers survive).
  location / { try_files $uri $uri/ /index.html; expires -1; }
}
