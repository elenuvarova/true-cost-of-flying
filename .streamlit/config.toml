# Brand theme for True Cost of Flying.
# Dark base is intentional: the flight-track map renders its coloured paths directly
# on the page background (no external tile provider), so a consistent dark canvas keeps
# the map legible regardless of the viewer's OS theme.
[theme]
base = "dark"
primaryColor = "#4ea8de"            # sky blue — links, focus, primary accents
backgroundColor = "#0b1622"         # deep night-sky
secondaryBackgroundColor = "#13243a" # cards / sidebar / expanders
textColor = "#e8eef5"
font = "sans serif"

[server]
# Static read-only app: no file watching needed in prod.
runOnSave = false
